<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บ้าน บ้าน — Baan Baan Bang Kra Jao</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Prompt:wght@200;300;400;500;600&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
<style>
:root {
  --deep:        #0d0907; 
  --timber:      #261b14; 
  --dusk:        #3d2e24; 
  --warm-glow:   #e69138; 
  --amber:       #f1c232; 
  --gold:        #cc8239; 
  --cream:       #15100c; 
  --paper:       #f5ede2; 
  --ink:         #fbf9f6; 
  --text2:       #a39387; 
}

*{margin:0;padding:0;box-sizing:border-box}

html, body {
  font-size: 16px;
  background: var(--deep);
  color: var(--ink);
  font-family: 'Prompt', sans-serif;
  overflow-x: hidden;
  position: relative;
  width: 100%;
  max-width: 100vw;
  
  /* 1. ไม่ให้หน้ากระดอนล้นขอบ (Lock at footer/header) */
  overscroll-behavior: none;
  
  /* 2. ห้ามลากคลุมดำตัวหนังสือ (Disable Text Highlight) */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  
  /* 3. ซ่อน Scrollbar */
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE & Edge */
}

/* ซ่อน cursor เฉพาะ desktop — JS จะ add .has-cursor เมื่อ detect mouse */
body.has-cursor,
body.has-cursor *,
body.has-cursor *::before,
body.has-cursor *::after { cursor: none !important; }

/* ซ่อน Scrollbar ของ Chrome/Safari/Opera */
::-webkit-scrollbar {
  display: none;
}

/* ─── ARTISTIC FADE (AMBIENT GLOWS) ─── */
/* ใช้ fixed แทน absolute เพื่อให้ไม่ push layout และไม่ล้นใต้ footer */
.ambient-glow {position:fixed;border-radius:50%;filter:blur(120px);opacity:0.25;pointer-events:none;z-index:0}
.glow-1 {top:15%;left:-10%;width:50vw;height:50vw;background:var(--warm-glow)}
.glow-2 {top:45%;right:-10%;width:40vw;height:40vw;background:#8b4513}
.glow-3 {top:60%;left:20%;width:60vw;height:40vw;background:var(--gold);opacity:0.15}

/* ─── CUSTOM CURSOR ─── */
body.is-touch { cursor: auto !important; }
body.is-touch .cursor-dot { display: none !important; }
.cursor-dot {
  position: fixed;
  width: 8px; height: 8px;
  background: var(--warm-glow);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .15s, height .15s, opacity .2s;
  will-change: left, top;
}
.cursor-ring { display: none !important; }

/* ─── WATER CANVAS ─── */
#water-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  pointer-events: none;
  z-index: 1;
  opacity: 0.6;
  mix-blend-mode: screen;
}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.4rem 5rem;display:flex;align-items:center;justify-content:space-between;transition:all .5s;background:linear-gradient(to bottom, rgba(13,9,7,0.9), transparent)}
nav.scrolled{background:rgba(21, 16, 12, 0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.nav-brand{display:flex;align-items:center;gap:.75rem}

.nav-logo-img{height:70px;width:auto;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.6));transition:transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
.nav-logo-img:hover{transform:scale(1.1) rotate(5deg)}

.nav-links{display:flex;gap:2.4rem;list-style:none}
.nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;font-weight:400;transition:all .3s;position:relative;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:linear-gradient(90deg, transparent, var(--warm-glow), transparent);transition:width .4s ease}
.nav-links a:hover{color:#fff;text-shadow:0 0 10px var(--warm-glow)}.nav-links a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:1rem}
.lang-switcher{display:flex;gap:2px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px;backdrop-filter:blur(10px)}
.lang-btn{background:none;border:none;color:rgba(255,255,255,.6);font-size:.75rem;padding:.3rem .7rem;border-radius:4px;cursor:pointer;font-family:'Prompt',sans-serif;font-weight:500;transition:all .3s}
.lang-btn.active{background:linear-gradient(135deg,var(--gold),var(--warm-glow));color:#fff;box-shadow:0 4px 12px rgba(204,130,57,.4)}
.btn-reserve{background:linear-gradient(135deg,var(--gold),var(--warm-glow));color:#fff;border:1px solid rgba(255,255,255,0.2);padding:.6rem 1.6rem;border-radius:6px;font-size:.75rem;letter-spacing:.05em;cursor:pointer;font-family:'Prompt',sans-serif;font-weight:500;transition:all .3s;box-shadow:0 6px 20px rgba(204,130,57,.4), inset 0 1px 0 rgba(255,255,255,0.3);position:relative;overflow:hidden}
.btn-reserve::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);transform:skewX(-25deg);transition:0.5s}
.btn-reserve:hover::before{left:150%}
.btn-reserve:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 30px rgba(204,130,57,.6)}

/* ─── HERO ─── */
.hero{position:relative;height:100vh;min-height:700px;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:2}
.hero-depth{position:absolute;inset:0;z-index:0;pointer-events:none}
.depth-layer{position:absolute;inset:0;will-change:transform}
.dl-sky{background:linear-gradient(rgba(13, 9, 7, 0.4), rgba(21, 16, 12, 0.9)), url('672683943_1444927530767284_938419184132739973_n.jpg') center/cover no-repeat;}
.dl-fog{background:radial-gradient(ellipse at 50% 50%,rgba(230,145,56,.2) 0%,transparent 70%);mix-blend-mode:screen}
.dl-water{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,transparent 0%,rgba(21,16,12,1) 100%)}

.hero-content{position:relative;z-index:6;text-align:center;padding:2rem;transform-style:preserve-3d;pointer-events:none} 
.hero-tag{font-size:.85rem;letter-spacing:.25em;text-transform:uppercase;color:var(--amber);margin-bottom:1.5rem;font-weight:400;text-shadow:0 2px 10px rgba(241,194,50,0.5)}
.hero-title-main{font-family:'Cormorant Garamond',serif;font-size:clamp(4.5rem,11vw,10rem);font-weight:700;line-height:.95;color:#fff;display:block;letter-spacing:-.01em;
  text-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 2px 5px rgba(230,145,56,0.5); transform:translateZ(40px)}
.hero-title-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,3vw,2.5rem);font-weight:400;font-style:italic;color:var(--paper);display:block;letter-spacing:.1em;margin-top:1rem;transform:translateZ(25px);text-shadow:0 5px 15px rgba(0,0,0,0.5)}
.hero-tagline{font-size:clamp(1rem,1.5vw,1.15rem);color:rgba(255,255,255,.8);margin:2rem auto;max-width:600px;line-height:1.8;font-weight:300;transform:translateZ(15px)}
.hero-btns {pointer-events:auto; transform:translateZ(20px)}

/* ─── SECTION COMMONS ─── */
section{position:relative;z-index:2;width:100%;overflow:hidden;}
section.pad{padding:8rem 6rem}
.eyebrow{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:.7rem;text-shadow:0 2px 5px rgba(0,0,0,0.3)}
.eyebrow::before{content:'';width:30px;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.eyebrow.light{color:var(--amber)}.eyebrow.light::before{background:linear-gradient(90deg,var(--amber),transparent)}
.h2{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,4.5vw,4rem);font-weight:600;line-height:1.15;color:#fff;margin-bottom:1.5rem;text-shadow:0 4px 15px rgba(0,0,0,0.4)}
.h2 em{font-style:italic;color:var(--gold);font-weight:400;background:linear-gradient(45deg, var(--amber), var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}

/* ─── ABOUT ─── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;max-width:1200px;margin:0 auto}
.about-pills{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:2rem}
.pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:.5rem 1.2rem;font-size:.85rem;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.2);transition:all .3s}
.pill:hover{background:rgba(230,145,56,.2);border-color:var(--amber);transform:translateY(-3px)}
.card-stack{position:relative;height:500px;transform-style:preserve-3d}
.stack-card{position:absolute;border-radius:12px;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.5);transform-style:preserve-3d}
.sc-main{width:80%;height:90%;top:0;right:0;background: url('598412052_1346259200634118_1208892153486049834_n.jpg') center/cover;border:1px solid rgba(255,255,255,0.1)}
.sc-mid{width:55%;height:55%;bottom:0;left:0;background: url('599965941_1346197270640311_536016969230609084_n.jpg') center/cover;border:1px solid rgba(255,255,255,0.1);transform:translateZ(30px)}
.sc-float{width:110px;height:110px;top:30%;right:-20px;background:linear-gradient(135deg, rgba(38,27,20,0.9), rgba(13,9,7,0.9));backdrop-filter:blur(10px);border:1px solid rgba(230,145,56,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;box-shadow:0 20px 40px rgba(0,0,0,.6), inset 0 0 15px rgba(255,255,255,0.05);transform:translateZ(60px)}
.sc-float-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--amber)}

/* ─── MENU ─── */
.menu-header{text-align:center;max-width:640px;margin:0 auto 5rem}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3rem;max-width:1050px;margin:0 auto}
.menu-card{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.15);border-left:1px solid rgba(255,255,255,.15);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.3);transform-style:preserve-3d;will-change:transform}
.menu-card:hover{box-shadow:0 30px 60px rgba(0,0,0,.6), 0 0 40px rgba(230,145,56,0.15)}
.menu-card-img{height:250px;position:relative;overflow:hidden;transform:translateZ(20px)}
.menu-card-img-bg{position:absolute;inset:0;transition:transform .8s cubic-bezier(0.2, 1, 0.2, 1)}
.menu-card:hover .menu-card-img-bg{transform:scale(1.08)}
.menu-card-body{padding:2rem;transform:translateZ(30px)}
.menu-card-tag{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:.6rem;font-weight:500}
.menu-card-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#fff;margin-bottom:.8rem;font-weight:600;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.menu-card-desc{font-size:.9rem;color:var(--text2);line-height:1.7}
.menu-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08)}
.menu-price{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--paper);font-style:italic}
.menu-badge{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--warm-glow);background:rgba(230,145,56,0.1);padding:0.4rem 0.8rem;border-radius:20px}

/* ─── AMBIANCE ─── */
.amb-header{text-align:center;max-width:640px;margin:0 auto 5rem}
.amb-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:2rem;max-width:1200px;margin:0 auto}
.amb-card{border-radius:16px;overflow:hidden;position:relative;min-height:420px;box-shadow:0 20px 50px rgba(0,0,0,0.5);transform-style:preserve-3d;border:1px solid rgba(255,255,255,0.05);will-change:transform}
.amb-card.tall{grid-row:span 1}
.amb-card-bg{position:absolute;inset:0;transition:transform .8s ease}
.amb-card:hover .amb-card-bg{transform:scale(1.06)}
.amb-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,9,7,1) 0%, rgba(13,9,7,0.4) 50%, transparent 100%);transition:opacity 0.4s}
.amb-card-content{position:absolute;bottom:0;left:0;right:0;padding:2.5rem;color:#fff;transform:translateZ(40px)}
.amb-card-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:.5rem;text-shadow:0 4px 10px rgba(0,0,0,0.8)}
.amb-card-desc{font-size:.9rem;color:rgba(255,255,255,.7);font-weight:300;line-height:1.6}

/* ─── INFO ─── */
.info-section{background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));border-top:1px solid rgba(255,255,255,0.03)}
.info-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:5rem;max-width:1200px;margin:0 auto;position:relative;z-index:2}
.info-brand-name{font-family:'Cormorant Garamond',serif;font-size:3.5rem;font-weight:700;color:#fff;text-shadow:0 5px 15px rgba(0,0,0,0.5)}
.info-brand-sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--amber);font-size:1.4rem;margin-bottom:1.5rem}
.info-col-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:#fff;margin-bottom:1.5rem;font-weight:600}
.hours-row{display:flex;justify-content:space-between;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:0.95rem;color:var(--text2)}
.map-box{margin-top:1.5rem;border-radius:12px;background:rgba(255,255,255,.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);padding:2rem;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);transform-style:preserve-3d;cursor:pointer;will-change:transform}

/* ─── FOOTER ─── */
footer {
  background: #000;
  padding: 2rem 6rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  width: 100%;
  box-sizing: border-box;
  gap: 1.5rem;
  color: rgba(255,255,255,.4);
  font-size: .85rem;
  border-top: 1px solid rgba(255,255,255,.05);
  position: relative;
  z-index: 10;  /* สูงกว่า glow ซึ่งเป็น fixed z-index:0 */
  isolation: isolate; /* ตัด glow ที่ fixed ไม่ให้ทะลุ */
}
footer a{color:rgba(255,255,255,.6);text-decoration:none;transition:color 0.3s}
footer a:hover{color:var(--amber)}

/* ─── REVEAL EFFECT ─── */
.rv{opacity:0;transform:translateY(30px);transition:all .8s cubic-bezier(0.2, 1, 0.2, 1)}
.rv.in{opacity:1;transform:none}
.rv.d1{transition-delay:.15s}.rv.d2{transition-delay:.3s}

/* ─── LANGUAGE DISPLAY LOGIC ─── */
.lang-th .en-text, .lang-th .zh-text {display:none!important}
.lang-en .th-text, .lang-en .zh-text {display:none!important}
.lang-zh .th-text, .lang-zh .en-text {display:none!important}
.lang-zh .h2, .lang-zh .menu-card-title, .lang-zh .amb-card-title {font-family:'Noto Serif SC',serif}

/* ─── LANGUAGE TRANSITION ─── */
/* fade overlay ที่ครอบทั้งหน้าตอน switch ภาษา */
#lang-overlay {
  position: fixed; inset: 0;
  background: rgba(13,9,7,0);
  pointer-events: none;
  z-index: 1000;
  transition: background 0.22s ease;
}
#lang-overlay.fading { background: rgba(13,9,7,0.55); }

/* ทุก element ที่มี data-i18n จะ transition opacity */
[data-i18n] {
  transition: opacity 0.18s ease;
}
body.lang-switching [data-i18n] {
  opacity: 0;
}

/* btn-reserve — ขนาดปรับ smooth เมื่อข้อความเปลี่ยน */
.btn-reserve {
  white-space: nowrap;
  transition: all .35s cubic-bezier(0.4,0,0.2,1) !important;
}

@media(max-width:1024px){
  section.pad{padding:5rem 2rem}
  .about-grid, .menu-grid, .info-grid, .amb-grid{grid-template-columns:1fr;gap:3rem}
  nav{padding:1rem 2rem}
  .nav-links{display:none}
  .ambient-glow{display:none}
  
  footer {
    padding: 2.5rem 2rem;
    flex-direction: column;
    text-align: center;
    justify-content: center;
  }
}
</style>
</head>
<body class="lang-th" id="htmlRoot">

<div id="lang-overlay"></div>
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>
<div class="ambient-glow glow-3"></div>

<canvas id="water-canvas"></canvas>
<div class="cursor-dot" id="cd"></div>

<nav id="mainNav">
  <div class="nav-brand">
    <img src="304765401_545025017424211_4003888834334631475_n-removebg-preview.png" alt="Baan Baan Logo" class="nav-logo-img">
  </div>
  <ul class="nav-links">
    <li><a href="#about" data-i18n="nav_about"></a></li>
    <li><a href="#menu" data-i18n="nav_menu"></a></li>

</nav>

      <span class="hero-title-main">บ้าน บ้าน</span>

      </span>

</section>

<section class="about-section pad" id="about">
  <div class="about-grid">
    <div class="rv">
      <p class="eyebrow"><span data-i18n="about_eyebrow"></span></p>
      <h2 class="h2" data-i18n="about_title"></h2>
      <p class="body-text" style="color:var(--text2); line-height:1.8; font-weight:300;" data-i18n="about_p1"></p>
      <p class="body-text" style="color:var(--text2); line-height:1.8; font-weight:300; margin-top:1rem" data-i18n="about_p2"></p>
      <div class="about-pills">
        <span class="pill"><i class="ti ti-tools-kitchen-2"></i><span data-i18n="pill1"></span></span>

        <span class="pill"><i class="ti ti-bike"></i><span data-i18n="pill4"></span></span>
      </div>

      <div class="card-stack tilt-element">

        <div class="sc-float stack-card">
          <span class="sc-float-num">4.4</span>
          <span style="font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.6)">Google</span>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="menu-section pad" id="menu">
  <div class="menu-header rv">
    <p class="eyebrow light" style="justify-content:center"><span data-i18n="menu_eyebrow"></span></p>
    <h2 class="h2" data-i18n="menu_title"></h2>
    <p style="color:var(--text2); font-weight:300;" data-i18n="menu_sub"></p>
  </div>
  
  <div class="menu-grid">

/* I18N LOGIC — with smooth transition */
let curLang = 'th';
const overlay = document.getElementById('lang-overlay');

function applyLang(lang, animate = true) {
  if (lang === curLang && animate) return;
  curLang = lang;

  const doSwap = () => {
    document.getElementById('htmlRoot').className = 'lang-' + lang + ' lang-switching';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (T[lang][key] !== undefined) el.innerHTML = T[lang][key];
    });
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
  };

  if (!animate) {
    doSwap();
    /* remove switching class instantly on first load */
    requestAnimationFrame(() => {
      document.getElementById('htmlRoot').classList.remove('lang-switching');
    });
    return;
  }

  /* 1. fade overlay in + fade text out */
  overlay.classList.add('fading');
  document.getElementById('htmlRoot').classList.add('lang-switching');

  setTimeout(() => {
    /* 2. swap all text mid-fade */
    doSwap();

    /* 3. fade overlay out + fade text back in */
    requestAnimationFrame(() => {
      overlay.classList.remove('fading');
      /* small delay so browser registers the class before removing */
      setTimeout(() => {
        document.getElementById('htmlRoot').classList.remove('lang-switching');
      }, 40);
    });
  }, 200); /* เท่ากับ transition duration ของ overlay */
}

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang, true));
});
applyLang('th', false);

/* NAVBAR SCROLL — ใช้ lenis event แทน window scroll */
lenis.on('scroll', ({ scroll }) => {
  document.getElementById('mainNav').classList.toggle('scrolled', scroll > 50);
});

/* ─── SMOOTH ANCHOR SCROLL ผ่าน Lenis ─── */
document.querySelectorAll('a[href^="#"], button[data-href^="#"]').forEach(link => {
  link.addEventListener('click', e => {
    const id = link.getAttribute('href') || link.dataset.href;
    if (!id || id === '#') return;
    const target = document.querySelector(id);
    if (!target) return;
    e.preventDefault();
    const navH = document.getElementById('mainNav').offsetHeight;
    lenis.scrollTo(target, { offset: -navH, duration: 1.4, easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
  });
});

/* REVEAL ON SCROLL */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target) } });
}, {threshold: .1});
document.querySelectorAll('.rv').forEach(el => io.observe(el));

/* ─── MOUSE SYSTEMS (desktop only) ─── */
(function(){
  const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  if (isTouch) { document.body.classList.add('is-touch'); return; }
  document.body.classList.add('has-cursor');

  /* === 1. CURSOR === */
  const cd = document.getElementById('cd');
  let mouseX = -200, mouseY = -200;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    cd.style.left = mouseX + 'px';
    cd.style.top  = mouseY + 'px';
  });
  document.addEventListener('mouseleave', () => cd.style.opacity = '0');
  document.addEventListener('mouseenter', () => cd.style.opacity = '1');

  /* dot ใหญ่ขึ้นเล็กน้อยตอน hover link/button */
  document.querySelectorAll('a, button, .map-box').forEach(el => {
    el.addEventListener('mouseenter', () => { cd.style.width='14px'; cd.style.height='14px'; });
    el.addEventListener('mouseleave', () => { cd.style.width='8px';  cd.style.height='8px'; });
  });

  /* === 2. WATER DISPLACEMENT CANVAS === */
  const canvas = document.getElementById('water-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* สร้าง grid ของ particles แทน wave lines
     แต่ละ particle มีตำแหน่ง home (hx,hy) และตำแหน่งปัจจุบัน (px,py)
     เมื่อ mouse เข้าใกล้ — ถูกผลักออก (displacement) สร้าง "หลุม"
     เมื่อ mouse ออกห่าง — spring กลับหา home */
  const COLS = 42, ROWS = 28;
  const particles = [];

  function buildGrid() {
    particles.length = 0;
    for (let r = 0; r <= ROWS; r++) {
      for (let c = 0; c <= COLS; c++) {
        particles.push({
          hx: (c / COLS) * W,
          hy: (r / ROWS) * H,
          px: (c / COLS) * W,
          py: (r / ROWS) * H,
          vx: 0, vy: 0
        });
      }
    }
  }
  buildGrid();
  window.addEventListener('resize', () => { resize(); buildGrid(); });

  /* smooth mouse */
  let smx = W/2, smy = H/2;
  const PUSH_RADIUS = 180;
  const PUSH_FORCE  = 5.5;
  const SPRING      = 0.06;
  const DAMP        = 0.82;

  function updateParticles() {
    for (const p of particles) {
      const dx = p.px - smx;
      const dy = p.py - smy;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < PUSH_RADIUS && dist > 0.01) {
        /* inverse-square push — สร้างหลุมตรงกลาง */
        const strength = PUSH_FORCE * Math.pow(1 - dist / PUSH_RADIUS, 2.2);
        p.vx += (dx / dist) * strength;
        p.vy += (dy / dist) * strength;
      }

      /* spring กลับหา home */
      p.vx += (p.hx - p.px) * SPRING;
      p.vy += (p.hy - p.py) * SPRING;

      /* dampen */
      p.vx *= DAMP;
      p.vy *= DAMP;

      p.px += p.vx;
      p.py += p.vy;
    }
  }

  function drawWater() {
    ctx.clearRect(0, 0, W, H);

    /* วาด horizontal lines — แถวๆ ของ grid */
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      for (let c = 0; c <= COLS; c++) {
        const p = particles[r * (COLS+1) + c];
        c === 0 ? ctx.moveTo(p.px, p.py) : ctx.lineTo(p.px, p.py);
      }
      /* ความสว่างขึ้นเมื่อ row อยู่ใกล้ mouse Y */
      const rowY = (r / ROWS) * H;
      const dy = Math.abs(rowY - smy);
      const alpha = 0.04 + Math.max(0, 1 - dy / 300) * 0.1;
      ctx.strokeStyle = `rgba(78,143,168,${alpha})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    /* วาด vertical lines */
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      for (let r = 0; r <= ROWS; r++) {
        const p = particles[r * (COLS+1) + c];
        r === 0 ? ctx.moveTo(p.px, p.py) : ctx.lineTo(p.px, p.py);
      }
      const colX = (c / COLS) * W;
      const dx2 = Math.abs(colX - smx);
      const alpha = 0.025 + Math.max(0, 1 - dx2 / 300) * 0.07;
      ctx.strokeStyle = `rgba(168,205,216,${alpha})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }

    /* hole glow — แสงส้มจางๆ ตรงหลุมน้ำ */
    const grd = ctx.createRadialGradient(smx, smy, 0, smx, smy, PUSH_RADIUS * 0.9);
    grd.addColorStop(0,   'rgba(13,9,7,0.18)');
    grd.addColorStop(0.4, 'rgba(230,145,56,0.06)');
    grd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  /* === 3. PROXIMITY TILT (ไม่ต้องอยู่บน card) === */
  const tiltEls = [...document.querySelectorAll('.tilt-element')];

  function updateTilts() {
    for (const el of tiltEls) {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const dx = smx - cx;
      const dy = smy - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const range = 340; /* รัศมีที่ card เริ่มหัน */

      if (dist < range) {
        const str = 1 - dist / range;
        const rY =  (dx / range) * 16 * str;
        const rX = -(dy / range) * 12 * str;
        const s  = 1 + str * 0.03;
        el.style.transition = 'transform 0.18s ease-out, box-shadow 0.18s ease-out';
        el.style.transform   = `perspective(1000px) rotateX(${rX}deg) rotateY(${rY}deg) scale(${s})`;
        el.style.boxShadow   = `0 ${10+str*30}px ${20+str*50}px rgba(0,0,0,${0.3+str*0.25})`;
      } else {
        el.style.transition = 'transform 0.8s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.8s ease';
        el.style.transform  = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
        el.style.boxShadow  = '';
      }
    }
  }

  /* === HERO CONTENT TILT === */
  const heroEl      = document.querySelector('.hero');
  const heroContent = document.querySelector('.hero-content');

  function updateHeroTilt() {
    if (!heroEl) return;
    const rect = heroEl.getBoundingClientRect();
    /* ทำงานเฉพาะตอน hero visible */
    if (rect.bottom < 0 || rect.top > H) return;
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    const rY =  ((smx - cx) / (rect.width  / 2)) * 5;
    const rX = -((smy - cy) / (rect.height / 2)) * 4;
    heroContent.style.transition = 'transform 0.25s ease-out';
    heroContent.style.transform  = `perspective(1200px) rotateX(${rX}deg) rotateY(${rY}deg)`;
  }

  /* === MAIN LOOP === */
  function loop() {
    smx += (mouseX - smx) * 0.07;
    smy += (mouseY - smy) * 0.07;
    updateParticles();
    drawWater();
    updateTilts();
    updateHeroTilt();
    requestAnimationFrame(loop);
  }
  loop();

})();

/* PARALLAX EFFECT FOR HERO BACKGROUND (Lenis Compatible) */
lenis.on('scroll', (e) => {
  const y = e.scroll;
  document.querySelector('.dl-sky').style.transform = `translateY(${y * .2}px)`;
});
</script>
</body>
